<!-- Agent detail — an agent is a note you can open (Agents Vault v2, frame 2) -->
@if (agent(); as a) {
	<div class="flex-1 flex flex-col min-h-0">
		<app-agent-hero
			[agent]="a"
			[running]="isRunning()"
			(runNow)="runNow()"
			(toggleEnabled)="toggleEnabled()"
		/>

		<!-- Body: what-it-does + raw file | triggers + recent runs -->
		<div class="flex-1 flex flex-col lg:flex-row min-h-0">
			<div class="flex-1 min-w-0">
				<app-agent-source [agent]="a" />
			</div>
			<app-agent-rail [agent]="a" [runs]="runs()" />
		</div>
	</div>
} @else {
	<div class="flex-1 flex items-center justify-center p-8">
		<p class="text-sm text-ink-4">Agent not found.</p>
	</div>
}
