<!--
  Settings screen — shared between modal (desktop) and full-page route (mobile).
  Uses Tailwind utilities for layout; Lucide icons for theme indicators.
-->
<div class="max-w-md mx-auto p-6">
  <h2 class="text-xl font-semibold mb-6 text-gray-900 dark:text-gray-100">
    Settings
  </h2>

  <!-- Theme Section -->
  <section class="mb-6">
    <h3
      class="text-xs font-semibold uppercase tracking-wider mb-3 text-gray-500 dark:text-gray-400"
    >
      Appearance
    </h3>
    <div class="grid grid-cols-3 gap-3">
      @for (t of themes; track t.value) {
        <button
          class="flex flex-col items-center gap-2 py-4 px-2 rounded-xl border-2 cursor-pointer transition-all duration-200"
          [ngClass]="
            theme() === t.value
              ? 'border-indigo-500 dark:border-indigo-400 bg-indigo-50 dark:bg-indigo-900/50 text-gray-900 dark:text-gray-100'
              : 'border-transparent hover:border-gray-300 dark:hover:border-gray-600 bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400'
          "
          (click)="setTheme(t.value)"
        >
          <!-- Lucide icon per theme -->
          @if (t.value === "light") {
            <svg lucideSun class="size-6"></svg>
          } @else if (t.value === "dark") {
            <svg lucideMoon class="size-6"></svg>
          } @else {
            <svg lucideMonitor class="size-6"></svg>
          }
          <span class="text-sm font-medium">{{ t.label }}</span>
        </button>
      }
    </div>
  </section>
</div>
