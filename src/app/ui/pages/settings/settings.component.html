<!--
  Settings screen — shared between modal (desktop) and full-page route (mobile).
  Uses Tailwind utilities for layout; Lucide icons for theme indicators.
-->
<div class="max-w-md mx-auto p-6">
	<!-- Title comes from the dialog label (desktop) / header breadcrumb (mobile). -->

	<!-- Theme Section -->
	<section class="mb-6">
		<h3
			class="text-[10.5px] font-bold uppercase tracking-[0.08em] mb-3 text-ink-4"
		>
			Appearance
		</h3>
		<div class="grid grid-cols-3 gap-3">
			@for (t of themes; track t.value) {
				<app-theme-button
					[value]="t.value"
					[label]="t.label"
					[selected]="theme() === t.value"
					(select)="setTheme(t.value)"
				/>
			}
		</div>
	</section>

	<!-- Debug Section -->
	<section class="mb-6">
		<h3
			class="text-[10.5px] font-bold uppercase tracking-[0.08em] mb-3 text-ink-4"
		>
			Developer
		</h3>
		<label
			class="flex items-center justify-between py-3 px-4 rounded-card border border-line cursor-pointer bg-surface hover:bg-surface-2 transition-colors duration-150"
		>
			<div class="flex flex-col">
				<span class="text-[13.5px] font-semibold text-ink-1">
					Sync debug logs
				</span>
				<span class="text-xs text-ink-3">
					Show verbose sync events in the browser console
				</span>
			</div>
			<button
				type="button"
				role="switch"
				class="relative inline-flex h-6.5 w-11.5 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200"
				[ngClass]="debugSync().debugSync ? 'bg-accent' : 'bg-line'"
				(click)="toggleDebugSync()"
			>
				<span
					class="pointer-events-none inline-block size-5 rounded-full bg-white shadow transform transition duration-200"
					[ngClass]="
						debugSync().debugSync
							? 'translate-x-5'
							: 'translate-x-0'
					"
				></span>
			</button>
		</label>
	</section>

	<!-- About Section -->
	<section>
		<h3
			class="text-[10.5px] font-bold uppercase tracking-[0.08em] mb-3 text-ink-4"
		>
			About
		</h3>
		<dl
			class="py-3 px-4 rounded-card border border-line bg-surface text-sm space-y-2"
		>
			<div class="flex items-center justify-between">
				<dt class="text-ink-3">Version</dt>
				<dd class="font-medium text-ink-1">
					{{ buildInfo.version }}
				</dd>
			</div>
			<div class="flex items-center justify-between">
				<dt class="text-ink-3">Build</dt>
				<dd class="font-mono text-xs text-ink-2">
					{{ buildInfo.gitSha }}
				</dd>
			</div>
			<div class="flex items-center justify-between">
				<dt class="text-ink-3">Built</dt>
				<dd class="text-ink-2">
					{{ buildTime }}
				</dd>
			</div>
		</dl>
	</section>
</div>
