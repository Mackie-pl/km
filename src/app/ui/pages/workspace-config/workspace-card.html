<div
	class="rounded-xl border border-line bg-surface transition-colors overflow-hidden"
	[class.border-accent-border]="isActive()"
	[class.bg-accent-bg]="isActive() && !isExpanded()"
>
	<!-- Card header: clickable row -->
	<div
		class="flex items-center gap-1 w-full p-3 cursor-pointer hover:bg-surface-2 transition-colors"
		(click)="select()"
	>
		<!-- Expand/collapse chevron -->
		<button
			type="button"
			(click)="onToggleExpand(); $event.stopPropagation()"
			class="flex items-center justify-center size-7 rounded-md border-none bg-transparent cursor-pointer transition-colors duration-150 text-ink-4 hover:text-ink-2 flex-shrink-0"
			[attr.aria-label]="isExpanded() ? 'Collapse' : 'Expand'"
		>
			@if (isExpanded()) {
			<svg lucideChevronDown class="size-4"></svg>
			} @else {
			<svg lucideChevronRight class="size-4"></svg>
			}
		</button>

		<div class="flex-1 font-semibold text-[13px] text-ink-1">
			{{ workspace().name }}
		</div>

		<!-- Active indicator -->
		@if (isActive()) {
		<span
			class="inline-flex items-center gap-1.5 rounded-full bg-ok-bg px-2.5 py-0.5 text-xs font-semibold text-ok-text"
		>
			<span class="size-1.5 rounded-full bg-ok-dot"></span>
			Active
		</span>
		}

		<button
			type="button"
			(click)="remove(); $event.stopPropagation()"
			class="flex items-center justify-center size-7 rounded-md border-none bg-transparent cursor-pointer transition-colors duration-150 text-ink-4 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/30 flex-shrink-0"
			[attr.aria-label]="'Remove ' + workspace().name"
		>
			<svg lucideTrash2 class="size-4"></svg>
		</button>
	</div>

	<!-- Expanded panel: adapter management -->
	@if (isExpanded()) {
	<app-workspace-adapter-panel
		[workspace]="workspace()"
	></app-workspace-adapter-panel>
	}
</div>
