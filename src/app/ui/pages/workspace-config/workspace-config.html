<div class="max-w-xl mx-auto p-6 text-ink-1">
	<!-- Title comes from the dialog label (desktop) / header breadcrumb (mobile). -->
	<p class="text-[13px] text-ink-3 mb-6">
		Configure workspaces and their sync adapters.
	</p>

	<!-- Existing workspaces list -->
	@if (workspaces().length > 0) {
	<span
		class="block text-[10.5px] font-bold uppercase tracking-[0.08em] text-ink-4 mb-2"
	>
		Existing Workspaces
	</span>

	@for (workspace of workspaces(); track workspace.id) {
	<app-workspace-card
		[workspace]="workspace"
		[isActive]="activeWorkspace()?.id === workspace.id"
		[isExpanded]="expandedWorkspaceId() === workspace.id"
		(toggleExpand)="toggleExpand(workspace.id)"
		class="mb-2 block"
	></app-workspace-card>
	} }

	<!-- Add new workspace button -->
	<button
		(click)="openWizard()"
		class="w-full rounded-btn bg-accent hover:bg-accent-2 text-white px-4 py-2.5 text-[12.5px] font-semibold transition-colors"
	>
		Add Workspace
	</button>
</div>
