<div
	class="flex items-center gap-2 rounded-xl border border-line bg-surface-2 px-3 py-2"
>
	@if (isLocal(adapterId())) { @if (isMobile()) {
	<svg lucideTablet class="size-4 text-ink-4 shrink-0"></svg>
	} @else {
	<svg lucideHardDrive class="size-5 text-ink-4 shrink-0"></svg>
	} } @else {
	<svg lucideCloud class="size-4 text-ink-4 shrink-0"></svg>

	}
	<span class="flex-1 text-[13px] font-medium text-ink-1">
		{{ getLabel(adapterId()) }}
	</span>

	@if (isLocal(adapterId())) {
	<span
		class="inline-flex items-center rounded-full bg-hairline px-2 py-0.5 text-xs font-medium text-ink-3"
	>
		Local
	</span>
	} @else {
	<button
		type="button"
		(click)="edit.emit()"
		class="flex items-center justify-center size-6 rounded-md border-none bg-transparent cursor-pointer transition-colors duration-150 text-ink-4 hover:text-ink-2 hover:bg-hairline"
		[attr.aria-label]="'Edit ' + adapterId()"
	>
		<svg lucideSettings class="size-3.5"></svg>
	</button>

	<button
		type="button"
		(click)="remove.emit()"
		class="flex items-center justify-center size-6 rounded-md border-none bg-transparent cursor-pointer transition-colors duration-150 text-ink-4 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/30"
		[attr.aria-label]="'Remove ' + adapterId()"
	>
		<svg lucideTrash2 class="size-3.5"></svg>
	</button>
	} @if (isConfiguring() && !isLocal(adapterId())) {
	<div class="w-full pt-2 mt-1 border-t border-line">
		<app-adapter-config-form
			[adapterId]="adapterId()"
			[existingConfig]="getConfig(workspace(), adapterId())"
			(save)="configSave.emit($event)"
			(cancel)="configCancel.emit()"
		></app-adapter-config-form>
	</div>
	}
</div>
