<tui-root>
	<!--
    No workspace selected → fixed overlay on top.
    Stays above the outlet so the user can't interact with behind it.
  -->
	@if (!workspaceService.activeWorkspace() && !isOnWizardRoute()) {
		<app-no-workspace (pickWorkspace)="openWorkspacePicker()" />
	}

	<!-- Out-of-band workspace notifications (Open-with mismatch, lost folder access). -->
	<app-top-notifications />

	<!--
    Shell layout: flex row so sidebar sits beside main content.
    Sidebar + header are conditionally visible; the router outlet is always present.
  -->
	<div class="flex flex-row h-screen overflow-hidden">
		<!-- Sidebar — only when workspace is active and NOT on wizard -->
		@if (workspaceService.activeWorkspace() && !isOnWizardRoute()) {
			<app-sidebar
				[(collapsed)]="sidebarCollapsed"
				[(mobileOpen)]="mobileSidebarOpen"
				(openWorkspaceConfig)="openWorkspaceConfig()"
			/>
		}

		<!-- Right side: header + main content (vertical stack) -->
		<div class="flex flex-col flex-1 min-w-0 overflow-hidden">
			<!-- Header — only when workspace is active and NOT on wizard -->
			@if (workspaceService.activeWorkspace() && !isOnWizardRoute()) {
				<app-header
					(toggleSidebar)="toggleMobileSidebar()"
					(openSettings)="openSettings()"
				/>
			}

			<!--
        Single router outlet — ALWAYS in the DOM.
        Never destroyed or recreated, so route transitions work seamlessly.
      -->
			<main class="flex-1 flex flex-col overflow-y-auto">
				<router-outlet />
			</main>
		</div>
	</div>

	@if (searchService.isOpen()) {
		<app-search-overlay />
	}
</tui-root>
