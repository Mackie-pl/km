@if (asCopy(); as copy) {
	<div
		class="flex flex-col gap-1.5 px-4 py-2 text-[13px] border-b border-warn-border bg-warn-page text-warn-text"
	>
		<span>
			⚠️ This is a conflict copy from
			<strong class="font-bold">{{ copy.adapterId }}</strong>
		</span>
		<app-conflict-row
			[name]="copy.original?.name ?? ''"
			[useLabel]="copy.original ? 'Make this the current version' : ''"
			discardLabel="Delete this copy"
			(openVersion)="open(copy.originalPath)"
			(useVersion)="useVersion(copy.original!, copy.entry)"
			(discardVersion)="discard(copy.entry, copy.originalPath)"
		/>
	</div>
} @else if (copies().length > 0) {
	<div
		class="flex flex-col gap-1.5 px-4 py-2 text-[13px] border-b border-warn-border bg-warn-page text-warn-text"
	>
		<span>
			⚠️ Sync conflict — {{ copies().length }} alternate
			version{{ copies().length === 1 ? '' : 's' }} of this note:
		</span>
		@for (copy of copies(); track copy.entry.id) {
			<app-conflict-row
				[name]="copy.entry.name"
				useLabel="Use that version"
				discardLabel="Keep current"
				(openVersion)="open(copy.entry.path)"
				(useVersion)="useVersion(current()!, copy.entry)"
				(discardVersion)="discard(copy.entry)"
			/>
		}
	</div>
}
