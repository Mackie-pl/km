@if (schema(); as s) {
	<div class="flex items-center gap-2">
		<svg lucideCloud class="size-5 text-ink-4 shrink-0"></svg>
		<div>
			<div class="text-[13px] font-semibold text-ink-1">
				{{ s.label }}
			</div>
			<div class="text-xs text-ink-3">
				{{ s.description }}
			</div>
		</div>
	</div>

	<div class="space-y-3 mt-4">
		@for (field of formFields(); track field.key) {
			<app-config-field
				[field]="field"
				[value]="getFieldValue(field)"
				[displayValue]="getDisplayValue(field)"
				(change)="onFieldChange($event)"
				(pick)="onPick($event)"
			></app-config-field>
		}
	</div>

	@if (validationError(); as err) {
		<div class="text-xs text-red-500 dark:text-red-400">{{ err }}</div>
	}

	<div class="flex items-center justify-end gap-2 pt-1">
		<button
			type="button"
			(click)="onCancel()"
			class="inline-flex items-center gap-1.5 rounded-btn px-3 py-1.5 text-xs font-semibold text-ink-3 transition-colors hover:bg-hairline hover:text-ink-1"
		>
			<svg lucideX class="size-3.5"></svg>
			Cancel
		</button>
		<button
			type="button"
			(click)="onSave()"
			[disabled]="testingConnection()"
			class="inline-flex items-center gap-1.5 rounded-btn bg-accent px-3 py-1.5 text-xs font-semibold text-white transition-colors hover:bg-accent-2 disabled:opacity-50 disabled:cursor-not-allowed"
		>
			<svg
				lucideLoader
				class="size-3.5 animate-spin"
				[class.hidden]="!testingConnection()"
			></svg>
			<svg
				lucideCheck
				class="size-3.5"
				[class.hidden]="testingConnection()"
			></svg>
			{{
				testingConnection()
					? 'Testing…'
					: existingConfig()
						? 'Update'
						: 'Add'
			}}
		</button>
	</div>
} @else {
	<div class="text-[13px] text-ink-3">
		Unknown adapter type: "{{ adapterId() }}"
	</div>
}
