<!--
  Fixed full-screen overlay with backdrop.
  The @if check happens in the parent (app.component.html) where isOpen() gates this component.
-->
<div
	class="fixed inset-0 z-50 flex items-start justify-center pt-[15vh]"
	data-backdrop
	(click)="onBackdropClick($event)"
>
	<!-- Backdrop -->
	<div
		class="absolute inset-0 bg-black/40 dark:bg-black/60"
		data-backdrop
	></div>

	<!-- Panel -->
	<div
		class="relative flex flex-col w-full max-w-lg mx-4 bg-white dark:bg-gray-900 rounded-xl shadow-2xl border border-gray-200 dark:border-gray-700 overflow-hidden"
		[class.ring-2]="true"
		[class.ring-indigo-500/30]="true"
	>
		<!-- Search input row -->
		<div
			class="flex items-center gap-3 px-4 py-3 border-b border-gray-200 dark:border-gray-700"
		>
			<svg
				lucideSearch
				class="size-5 shrink-0 text-gray-400 dark:text-gray-500"
			></svg>
			<input
				#searchInput
				[value]="search.query()"
				(input)="onQueryChange($event.target.value)"
				placeholder="Search files..."
				class="flex-1 bg-transparent text-sm text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 outline-none"
				autocomplete="off"
				spellcheck="false"
			/>
		</div>

		<!-- Results list -->
		<div class="overflow-y-auto max-h-[60vh]">
			@if (search.results().length === 0 && search.query().length > 0) {
				<div
					class="px-4 py-8 text-center text-sm text-gray-400 dark:text-gray-500"
				>
					No results found
				</div>
			}

			@for (entry of search.results(); track entry.id; let i = $index) {
				<app-search-result-item
					[name]="entry.name"
					[parentPath]="
						entry.path.includes('/')
							? entry.path.substring(
									0,
									entry.path.lastIndexOf('/')
								)
							: ''
					"
					[selected]="selectedIndex() === i"
					(open)="openResult(i)"
					(hovered)="selectedIndex.set(i)"
					[attr.data-search-index]="i"
				/>
			}
		</div>

		<!-- Footer hint -->
		<div
			class="flex items-center gap-3 px-4 py-2 border-t border-gray-200 dark:border-gray-700 text-xs text-gray-400 dark:text-gray-500"
		>
			<span>↑↓ Navigate</span>
			<span class="text-gray-300 dark:text-gray-600">·</span>
			<span>⏎ Open</span>
			<span class="text-gray-300 dark:text-gray-600">·</span>
			<span>Esc Close</span>
		</div>
	</div>
</div>
