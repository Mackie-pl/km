<!--
  Single sidebar template — CSS class switching for desktop vs mobile.
  Desktop: relative, collapsible w-64 / w-16.
  Mobile: fixed z-50 overlay, slide in/out via translate-x.
-->

<!-- Mobile backdrop -->
@if (!isDesktop() && mobileOpen()) {
	<div
		class="fixed inset-0 z-40 bg-black/50 transition-opacity duration-300"
		(click)="closeMobile()"
	></div>
}

<!-- Sidebar panel -->
<aside
	class="flex flex-col h-full flex-shrink-0 border-r transition-all duration-300 overflow-hidden bg-surface-2 border-line"
	[class.w-64]="!isDesktop() || !collapsed()"
	[class.w-16]="isDesktop() && collapsed()"
	[class.fixed]="!isDesktop()"
	[class.z-50]="!isDesktop()"
	[class.w-72]="!isDesktop()"
	[class.top-0]="!isDesktop()"
	[class.left-0]="!isDesktop()"
	[class.translate-x-0]="!isDesktop() && mobileOpen()"
	[class.-translate-x-full]="!isDesktop() && !mobileOpen()"
	[class.relative]="isDesktop()"
	data-tauri-drag-region
	(touchstart)="onTouchStart($event)"
	(touchend)="onTouchEnd($event)"
>
	<!-- Header — vault (workspace) name + new-item actions + collapse toggle.
	     Collapsed: stacks vertically (toggle first, then actions).
	     Layout switches on railMode() (post-animation), width on collapsed(). -->
	<div
		class="flex items-center gap-1 flex-shrink-0"
		[class.h-12]="!isDesktop() || !railMode()"
		[class.px-3]="!isDesktop() || !railMode()"
		[class.flex-col]="isDesktop() && railMode()"
		[class.py-2]="isDesktop() && railMode()"
	>
		@if ((isDesktop() && !railMode()) || !isDesktop()) {
			<span
				class="flex-1 min-w-0 text-[13px] font-bold tracking-[-0.01em] truncate text-ink-1"
				>{{ activeWorkspace()?.name ?? 'Notes' }}</span
			>
		}
		<button
			class="flex flex-shrink-0 items-center justify-center size-7 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-150 text-ink-3 hover:bg-hairline hover:text-ink-1"
			(click)="vaultList()?.createNewFolder()"
			aria-label="New Folder"
		>
			<svg lucideFolderPlus class="size-4.5 flex-shrink-0"></svg>
		</button>
		<button
			class="flex flex-shrink-0 items-center justify-center size-7 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-150 text-ink-3 hover:bg-hairline hover:text-ink-1"
			(click)="vaultList()?.createNewFile()"
			aria-label="New File"
		>
			<svg lucideFilePlus class="size-4.5 flex-shrink-0"></svg>
		</button>
		<button
			class="flex flex-shrink-0 items-center justify-center size-7 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-150 text-ink-3 hover:bg-hairline hover:text-ink-1"
			[class.order-first]="isDesktop() && railMode()"
			(click)="isDesktop() ? toggleCollapsed() : closeMobile()"
			[attr.aria-label]="
				isDesktop()
					? collapsed()
						? 'Expand sidebar'
						: 'Collapse sidebar'
					: 'Close sidebar'
			"
		>
			@if (isDesktop() && collapsed()) {
				<svg lucideChevronRight class="size-4"></svg>
			} @else if (isDesktop()) {
				<svg lucideChevronLeft class="size-4"></svg>
			} @else {
				<svg lucideX class="size-5"></svg>
			}
		</button>
	</div>

	<!-- Vault list (scrollable) -->
	<nav class="flex-1 overflow-y-auto overflow-x-hidden px-2 py-2">
		<app-sidebar-vault-list
			[collapsed]="railMode()"
			[collapsedNow]="collapsed()"
			[activeEntryPath]="activeEntryPath()"
		/>
	</nav>

	<!-- Activity + Archive -->
	<div class="flex-shrink-0 px-2 pb-1 pt-1 border-t border-line">
		<app-sidebar-activity-link
			[showLabel]="!isDesktop() || !railMode()"
			(pressed)="closeMobile()"
		/>
		<button
			class="flex items-center w-full gap-3 py-2 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-150 text-left text-ink-3 hover:bg-hairline hover:text-ink-1"
			[class.px-3]="!isDesktop() || !railMode()"
			[class.justify-center]="isDesktop() && railMode()"
			aria-label="Archive"
		>
			<svg lucideArchive class="size-4.5 flex-shrink-0"></svg>
			@if (!isDesktop() || !railMode()) {
				<span class="text-[13px] font-medium truncate">Archive</span>
			}
		</button>
	</div>

	<!-- Workspace footer -->
	<div class="flex-shrink-0 border-t border-line bg-surface-2 p-2">
		<button
			(click)="openWorkspaceConfigDialog()"
			class="flex items-center w-full gap-3 py-2 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-150 text-left text-ink-3 hover:bg-hairline hover:text-ink-1"
			[class.px-3]="!isDesktop() || !railMode()"
			[class.justify-center]="isDesktop() && railMode()"
			[attr.aria-label]="
				'Workspace: ' + (activeWorkspace()?.name ?? 'None')
			"
		>
			@if (!isDesktop() || !railMode()) {
				<span class="text-xs font-medium text-ink-2 truncate">
					{{ activeWorkspace()?.name }}
				</span>
			}
			<svg
				lucideSettings
				class="size-4 flex-shrink-0"
				[class.ml-auto]="!isDesktop() || !railMode()"
			></svg>
		</button>

		<!-- Unobtrusive version label. Always in the DOM so the footer height
		     stays constant across collapse (prevents the footer from jumping);
		     the text just fades out in the collapsed rail. -->
		<div
			class="px-3 pt-1 text-right text-[10px] leading-none font-mono text-ink-5 select-none transition-opacity duration-150"
			[class.opacity-0]="isDesktop() && railMode()"
		>
			v{{ appVersion }}
		</div>
	</div>
</aside>
