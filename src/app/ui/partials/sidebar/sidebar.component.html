<!--
  Single sidebar template — CSS class switching for desktop vs mobile.
  Desktop: relative, collapsible w-64 / w-16.
  Mobile: fixed z-50 overlay, slide in/out via translate-x.
-->

<!-- Mobile backdrop -->
@if (!isDesktop() && mobileOpen()) {
	<div
		class="fixed inset-0 z-40 bg-black/50 transition-opacity duration-300"
		(click)="closeMobile()"
	></div>
}

<!-- Sidebar panel -->
<aside
	class="flex flex-col h-full flex-shrink-0 border-r transition-all duration-300 overflow-hidden bg-surface-2 border-line"
	[class.w-64]="!isDesktop() || !collapsed()"
	[class.w-16]="isDesktop() && collapsed()"
	[class.fixed]="!isDesktop()"
	[class.z-50]="!isDesktop()"
	[class.w-72]="!isDesktop()"
	[class.top-0]="!isDesktop()"
	[class.left-0]="!isDesktop()"
	[class.translate-x-0]="!isDesktop() && mobileOpen()"
	[class.-translate-x-full]="!isDesktop() && !mobileOpen()"
	[class.relative]="isDesktop()"
	data-tauri-drag-region
	(touchstart)="onTouchStart($event)"
	(touchend)="onTouchEnd($event)"
>
	<!-- Header — the vault (workspace) name -->
	<div class="flex items-center h-12 px-3 flex-shrink-0">
		@if ((isDesktop() && !collapsed()) || !isDesktop()) {
			<span
				class="text-[13px] font-bold tracking-[-0.01em] truncate text-ink-1"
				>{{ activeWorkspace()?.name ?? 'Notes' }}</span
			>
		}
		<button
			class="ml-auto flex items-center justify-center size-7 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-150 text-ink-3 hover:bg-hairline hover:text-ink-1"
			(click)="isDesktop() ? toggleCollapsed() : closeMobile()"
			[attr.aria-label]="
				isDesktop()
					? collapsed()
						? 'Expand sidebar'
						: 'Collapse sidebar'
					: 'Close sidebar'
			"
		>
			@if (isDesktop() && collapsed()) {
				<svg lucideChevronRight class="size-4"></svg>
			} @else if (isDesktop()) {
				<svg lucideChevronLeft class="size-4"></svg>
			} @else {
				<svg lucideX class="size-5"></svg>
			}
		</button>
	</div>

	<!-- Vault list (scrollable) -->
	<nav class="flex-1 overflow-y-auto px-2 py-2">
		<app-sidebar-vault-list
			[collapsed]="collapsed()"
			[activeEntryPath]="activeEntryPath()"
		/>
	</nav>

	<!-- Activity + Archive -->
	<div class="flex-shrink-0 px-2 pb-1 pt-1 border-t border-line">
		<app-sidebar-activity-link
			[showLabel]="!isDesktop() || !collapsed()"
			(pressed)="closeMobile()"
		/>
		<button
			class="flex items-center w-full gap-3 px-3 py-2 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-150 text-left text-ink-3 hover:bg-hairline hover:text-ink-1"
			aria-label="Archive"
		>
			<svg lucideArchive class="size-4.5 flex-shrink-0"></svg>
			@if (!isDesktop() || !collapsed()) {
				<span class="text-[13px] font-medium">Archive</span>
			}
		</button>
	</div>

	<!-- Workspace footer -->
	<div class="flex-shrink-0 border-t border-line bg-surface-2 p-2">
		<button
			(click)="openWorkspaceConfigDialog()"
			class="flex items-center w-full gap-3 px-3 py-2 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-150 text-left text-ink-3 hover:bg-hairline hover:text-ink-1"
			[attr.aria-label]="
				'Workspace: ' + (activeWorkspace()?.name ?? 'None')
			"
		>
			@if (!isDesktop() || !collapsed()) {
				<span class="text-xs font-medium text-ink-2">
					{{ activeWorkspace()?.name }}
				</span>
			}
			<svg lucideSettings class="size-4 flex-shrink-0 ml-auto"></svg>
		</button>

		<!-- Unobtrusive version label (expanded only) -->
		@if (!isDesktop() || !collapsed()) {
			<div
				class="px-3 pt-1 text-right text-[10px] leading-none font-mono text-ink-5 select-none"
			>
				v{{ appVersion }}
			</div>
		}
	</div>
</aside>
