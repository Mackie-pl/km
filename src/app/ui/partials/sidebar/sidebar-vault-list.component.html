<!--
  Vault file & folder tree — single template used by both desktop and mobile sidebar.
  Labels hide via [class.sr-only] when collapsed() is true.
  Renders tree via SidebarTreeRowComponent to stay within nesting limits.
-->
<div
	class="flex h-full flex-col px-1"
	(contextmenu)="onBackgroundContextMenu($event)"
>
	<!-- Header row: label + action buttons (only when items exist) -->
	<div class="flex items-center justify-between px-3 py-2">
		<span
			class="text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400"
		>
			Vault
		</span>
		<span
			[class.hidden]="!treeNodes().length"
			class="flex items-center gap-1"
		>
			<button
				class="flex items-center gap-3 rounded-lg border-none bg-transparent px-3 py-2 text-left text-sm text-gray-500 transition-colors duration-150 hover:bg-gray-200 hover:text-gray-900 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-gray-100"
				(click)="createNewFolder()"
				[attr.aria-label]="'New Folder'"
			>
				<svg lucideFolderPlus class="size-5 flex-shrink-0"></svg>
			</button>
			<button
				class="flex items-center gap-3 rounded-lg border-none bg-transparent px-3 py-2 text-left text-sm text-gray-500 transition-colors duration-150 hover:bg-gray-200 hover:text-gray-900 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-gray-100"
				(click)="createNewFile()"
				[attr.aria-label]="'New File'"
			>
				<svg lucideFilePlus class="size-5 flex-shrink-0"></svg>
			</button>
		</span>
	</div>

	<!-- Content area -->
	<div class="flex-1 space-y-1 overflow-y-auto">
		@if (treeNodes().length) {
			<hr class="mx-3 mb-1 border-gray-200 dark:border-gray-700" />

			@for (node of treeNodes(); track node.entry.id) {
				<app-sidebar-tree-row
					[node]="node"
					[collapsed]="collapsed()"
					[activeEntryPath]="activeEntryPath()"
					[contextEntry]="contextEntry()"
					[renamingId]="renamingId()"
					[expandedFolders]="expandedFolders()"
					(toggleFolder)="toggleFolder($event)"
					(openFile)="openFile($event)"
					(onContextMenu)="onEntryContextMenu($event)"
					(startRename)="startRename($event)"
					(commitRename)="commitRename($event.id, $event.name)"
					(cancelRename)="cancelRename()"
					(deleteEntry)="deleteEntry($event)"
					(createNewFileInFolder)="createNewFile($event)"
				/>
			}
		} @else {
			<!-- Empty state: New Folder / New File buttons -->
			<button
				class="flex w-full items-center gap-3 rounded-lg border-none bg-transparent px-3 py-2 text-left text-sm text-gray-500 transition-colors duration-150 hover:bg-gray-200 hover:text-gray-900 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-gray-100"
				(click)="createNewFolder()"
				[attr.aria-label]="'New Folder'"
			>
				<svg lucideFolderPlus class="size-5 flex-shrink-0"></svg>
				<span class="text-sm font-medium" [class.sr-only]="collapsed()"
					>New Folder</span
				>
			</button>
			<button
				class="flex w-full items-center gap-3 rounded-lg border-none bg-transparent px-3 py-2 text-left text-sm text-gray-500 transition-colors duration-150 hover:bg-gray-200 hover:text-gray-900 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-gray-100"
				(click)="createNewFile()"
				[attr.aria-label]="'New File'"
			>
				<svg lucideFilePlus class="size-5 flex-shrink-0"></svg>
				<span class="text-sm font-medium" [class.sr-only]="collapsed()"
					>New File</span
				>
			</button>
			<div
				class="rounded-lg bg-gray-100 px-3 py-2 text-sm text-gray-500 dark:bg-gray-800 dark:text-gray-400"
			>
				No notes yet
			</div>
		}
	</div>
</div>

<!-- Background (empty area) context menu — positioned at cursor -->
@if (backgroundMenuOpen()) {
	<div
		class="fixed z-50"
		[style.left.px]="backgroundMenuX()"
		[style.top.px]="backgroundMenuY()"
		(contextmenu)="$event.preventDefault()"
	>
		<div
			class="flex min-w-36 flex-col rounded-lg border border-gray-200 bg-white py-1 shadow-lg dark:border-gray-700 dark:bg-gray-900"
		>
			<button
				class="flex cursor-pointer items-center gap-3 border-none bg-transparent px-3 py-2.5 text-left text-sm text-gray-900 transition-colors duration-150 hover:bg-gray-200 dark:text-gray-100 dark:hover:bg-gray-800"
				(click)="createNewFile()"
			>
				<svg lucideFilePlus class="size-4 flex-shrink-0"></svg>
				New File
			</button>
			<button
				class="flex cursor-pointer items-center gap-3 border-none bg-transparent px-3 py-2.5 text-left text-sm text-gray-900 transition-colors duration-150 hover:bg-gray-200 dark:text-gray-100 dark:hover:bg-gray-800"
				(click)="createNewFolder()"
			>
				<svg lucideFolderPlus class="size-4 flex-shrink-0"></svg>
				New Folder
			</button>
		</div>
	</div>
}
