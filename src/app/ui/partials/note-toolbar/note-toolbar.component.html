<div
	class="flex items-center gap-2 px-4 py-2 border-b border-gray-200 dark:border-gray-700"
>
	<!-- Icon picker button — opens the full dialog -->
	<button
		class="flex items-center justify-center size-8 rounded-lg border-none bg-transparent cursor-pointer text-lg transition-colors duration-150 hover:bg-gray-200 dark:hover:bg-gray-800"
		(click)="openIconPicker()"
		[attr.aria-label]="'Note icon'"
	>
		@if (isLucideIcon()) {
			<ng-container [ngComponentOutlet]="lucideComponent()" />
		} @else {
			{{ displayIcon() }}
		}
	</button>

	<!-- Tag pills + add/edit button -->
	<div class="flex items-center gap-1.5 flex-wrap">
		@for (tag of currentTags(); track tag) {
			<span
				class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400"
			>
				{{ tag }}
			</span>
		}
		<button
			type="button"
			class="flex items-center justify-center size-6 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-150 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-800"
			[attr.aria-label]="'Manage tags'"
			[tuiDropdownManual]="tagDropdownOpen()"
			[tuiDropdown]="tagPicker"
			(click)="tagDropdownOpen.set(!tagDropdownOpen())"
		>
			<svg lucidePlus class="size-3.5"></svg>
		</button>
	</div>

	<!-- Tag picker dropdown -->
	<ng-template #tagPicker>
		<div
			class="min-w-48 max-h-64 overflow-y-auto bg-white dark:bg-gray-900 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 p-2 space-y-1"
			(click)="$event.stopPropagation()"
		>
			<!-- Current tags on this note (checked items) -->
			@if (currentTags().length > 0) {
				<p
					class="px-2 py-1 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide"
				>
					Current
				</p>
				@for (tag of currentTags(); track tag) {
					<button
						type="button"
						(click)="toggleTag(tag)"
						class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-sm text-left transition-colors hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300"
					>
						✓ {{ tag }}
					</button>
				}
				<hr class="my-1 border-gray-200 dark:border-gray-700" />
			}

			<!-- All other tags (unchecked items) -->
			@if (availableTags().length > 0) {
				<p
					class="px-2 py-1 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide"
				>
					All tags
				</p>
				@for (tag of availableTags(); track tag) {
					<button
						type="button"
						(click)="toggleTag(tag)"
						class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-sm text-left transition-colors hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 dark:text-gray-400"
					>
						○ {{ tag }}
					</button>
				}
				<hr class="my-1 border-gray-200 dark:border-gray-700" />
			}

			<!-- Add new tag input -->
			<div class="flex items-center gap-1.5 px-1">
				<input
					[(ngModel)]="newTagInput"
					(blur)="closeTagDropdown()"
					(keydown.enter)="addNewTag()"
					(keydown.escape)="closeTagDropdown()"
					placeholder="New tag..."
					class="flex-1 min-w-0 rounded-md border border-gray-300 dark:border-gray-600 bg-transparent px-2 py-1 text-sm outline-none focus:border-indigo-500 dark:focus:border-indigo-400 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500"
				/>
				<button
					type="button"
					(click)="addNewTag()"
					[disabled]="!newTagInput().trim() || newTagInvalid()"
					class="flex shrink-0 items-center justify-center size-7 rounded-md transition-colors bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 dark:disabled:bg-gray-700 text-white disabled:text-gray-500 dark:disabled:text-gray-400"
					[attr.aria-label]="'Add tag'"
				>
					<svg lucidePlus class="size-3.5"></svg>
				</button>
			</div>
			@if (newTagInvalid()) {
				<p class="px-2 text-xs text-red-500 dark:text-red-400">
					Characters <code>[</code>, <code>]</code>,
					<code>,</code> are not allowed.
				</p>
			}
		</div>
	</ng-template>
</div>
