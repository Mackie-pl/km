<div class="flex items-center gap-2 px-4 py-2 border-b border-line">
	<!-- Icon picker button — opens the full dialog -->
	<button
		class="flex items-center justify-center size-8 rounded-lg border-none bg-transparent cursor-pointer text-lg transition-colors duration-150 hover:bg-hairline"
		(click)="openIconPicker()"
		[attr.aria-label]="'Note icon'"
	>
		@if (isLucideIcon()) {
			<ng-container [ngComponentOutlet]="lucideComponent()" />
		} @else {
			{{ displayIcon() }}
		}
	</button>

	<!-- Tag pills + add/edit button -->
	<div class="flex items-center gap-1.5 flex-wrap">
		@for (tag of currentTags(); track tag) {
			<span
				class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-accent-bg text-accent-text"
			>
				{{ tag }}
			</span>
		}
		<button
			type="button"
			class="flex items-center justify-center size-6 rounded-full border border-dashed border-accent-border bg-transparent cursor-pointer transition-colors duration-150 text-accent-2 hover:bg-accent-bg"
			[attr.aria-label]="'Manage tags'"
			[tuiDropdownManual]="tagDropdownOpen()"
			[tuiDropdown]="tagPicker"
			(click)="tagDropdownOpen.set(!tagDropdownOpen())"
		>
			<svg lucidePlus class="size-3.5"></svg>
		</button>
	</div>

	<!-- Tag picker dropdown -->
	<ng-template #tagPicker>
		<div
			class="min-w-48 max-h-64 overflow-y-auto bg-surface rounded-xl shadow-popover border border-line p-2 space-y-1"
			(click)="$event.stopPropagation()"
		>
			<!-- Current tags on this note (checked items) -->
			@if (currentTags().length > 0) {
				<p
					class="px-2 py-1 text-[10.5px] font-bold uppercase tracking-[0.08em] text-ink-4"
				>
					Current
				</p>
				@for (tag of currentTags(); track tag) {
					<button
						type="button"
						(click)="toggleTag(tag)"
						class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-[13px] text-left transition-colors hover:bg-hairline text-ink-2"
					>
						✓ {{ tag }}
					</button>
				}
				<hr class="my-1 border-hairline" />
			}

			<!-- All other tags (unchecked items) -->
			@if (availableTags().length > 0) {
				<p
					class="px-2 py-1 text-[10.5px] font-bold uppercase tracking-[0.08em] text-ink-4"
				>
					All tags
				</p>
				@for (tag of availableTags(); track tag) {
					<button
						type="button"
						(click)="toggleTag(tag)"
						class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-[13px] text-left transition-colors hover:bg-hairline text-ink-3"
					>
						○ {{ tag }}
					</button>
				}
				<hr class="my-1 border-hairline" />
			}

			<!-- Add new tag input -->
			<div class="flex items-center gap-1.5 px-1">
				<input
					[(ngModel)]="newTagInput"
					(blur)="closeTagDropdown()"
					(keydown.enter)="addNewTag()"
					(keydown.escape)="closeTagDropdown()"
					placeholder="New tag..."
					class="flex-1 min-w-0 rounded-md border border-line bg-transparent px-2 py-1 text-[13px] outline-none focus:border-accent text-ink-1 placeholder-ink-4"
				/>
				<button
					type="button"
					(click)="addNewTag()"
					[disabled]="!newTagInput().trim() || newTagInvalid()"
					class="flex shrink-0 items-center justify-center size-7 rounded-md transition-colors bg-accent hover:bg-accent-2 disabled:bg-hairline text-white disabled:text-ink-4"
					[attr.aria-label]="'Add tag'"
				>
					<svg lucidePlus class="size-3.5"></svg>
				</button>
			</div>
			@if (newTagInvalid()) {
				<p class="px-2 text-xs text-red-500 dark:text-red-400">
					Characters <code>[</code>, <code>]</code>,
					<code>,</code> are not allowed.
				</p>
			}
		</div>
	</ng-template>
</div>
