<!--
  Header bar — data-tauri-drag-region enables window dragging on desktop.
  pt-[env(safe-area-inset-top,0px)] pushes below the camera notch on mobile.
  Layout per "Agents Vault v2": breadcrumb on the left, search + Ask on the right.
-->
<header
	class="flex items-center justify-between min-h-12 px-4 pt-[env(safe-area-inset-top,0px)] flex-shrink-0 select-none border-b bg-hairline border-line"
	data-tauri-drag-region
>
	<!-- Left side: back to vault (mobile only) + breadcrumb -->
	<div class="flex items-center gap-2 min-w-0">
		@if (platformService.isMobile()) {
			<button
				class="flex items-center justify-center size-8 rounded-btn border-none bg-transparent cursor-pointer transition-colors duration-150 text-ink-3 hover:bg-surface hover:text-ink-1"
				(click)="goBackToVault()"
				aria-label="Back to vault"
				title="Vault"
			>
				<svg lucideChevronLeft class="size-5"></svg>
			</button>
		}
		<span class="text-[12.5px] font-medium truncate text-ink-4">
			@if (breadcrumb().parents) {
				<span class="hidden sm:inline"
					>{{ breadcrumb().parents }} /
				</span>
			}
			<span class="text-ink-2">{{ breadcrumb().current }}</span>
		</span>
	</div>

	<!-- Right side: search + sync (shown only when auto-sync failed in browser) + Ask + settings gear -->
	<div class="flex items-center gap-1.5">
		<button
			class="flex items-center justify-center size-8 rounded-btn border-none bg-transparent cursor-pointer transition-colors duration-150 text-ink-3 hover:bg-surface hover:text-ink-1"
			(click)="openSearch()"
			aria-label="Search files"
			title="Search (Ctrl+K)"
		>
			<svg lucideSearch class="size-5"></svg>
		</button>
		@if (showReconnect()) {
			<button
				class="flex items-center gap-1.5 h-8 pl-2 pr-2.5 rounded-btn border border-warn-border bg-warn-tint text-warn-text cursor-pointer transition-colors duration-150 hover:bg-warn-page"
				(click)="reconnectGDrive()"
				aria-label="Reconnect Google Drive"
				title="Google Drive sign-in expired — click to reconnect and resume syncing"
			>
				<svg lucideCloud class="size-4 text-warn-icon shrink-0"></svg>
				<span class="text-[12px] font-semibold whitespace-nowrap"
					>Reconnect Drive</span
				>
			</button>
		} @else if (!platformService.isDesktopTauri() && syncEngine.syncFailed()) {
			<button
				class="flex items-center justify-center size-8 rounded-btn border-none bg-transparent cursor-pointer transition-colors duration-150 text-red-500 dark:text-red-400 hover:bg-surface"
				(click)="syncNow()"
				aria-label="Sync now — auto-sync failed"
				[attr.title]="syncEngine.lastSyncError() ?? 'Sync now'"
			>
				<svg
					lucideRefreshCw
					class="size-5"
					[class.animate-spin]="syncEngine.isSyncing()"
				></svg>
			</button>
		}

		<!-- THE single agent button -->
		<app-ask-button />

		@if (!platformService.isDesktopTauri()) {
			<button
				class="flex items-center justify-center size-8 rounded-btn border-none bg-transparent cursor-pointer transition-colors duration-150 text-ink-3 hover:bg-surface hover:text-ink-1"
				(click)="openSettings.emit()"
				aria-label="Open settings"
				title="Settings"
			>
				<svg lucideSettings class="size-5"></svg>
			</button>
		}
	</div>
</header>
