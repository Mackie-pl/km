<!--
  Header bar — data-tauri-drag-region enables window dragging on desktop.
  pt-[env(safe-area-inset-top,0px)] pushes below the camera notch on mobile.
-->
<header
	class="flex items-center justify-between min-h-12 px-4 pt-[env(safe-area-inset-top,0px)] flex-shrink-0 select-none border-b bg-gray-100 dark:bg-gray-900 border-gray-200 dark:border-gray-700"
	data-tauri-drag-region
>
	<!-- Left side: hamburger (mobile only) + title -->
	<div class="flex items-center gap-2">
		@if (platformService.isMobile()) {
			<button
				class="flex items-center justify-center size-8 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-150 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-gray-100"
				(click)="toggleSidebar.emit()"
				aria-label="Open sidebar"
				title="Menu"
			>
				<svg lucideMenu class="size-5"></svg>
			</button>
		}
		<span
			class="text-[0.9375rem] font-semibold text-gray-900 dark:text-gray-100"
			>Notes2</span
		>
	</div>

	<!-- Right side: search + sync (shown only when auto-sync failed in browser) + settings gear -->
	<div class="flex items-center gap-1">
		<button
			class="flex items-center justify-center size-8 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-150 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-gray-100"
			(click)="openSearch()"
			aria-label="Search files"
			title="Search (Ctrl+K)"
		>
			<svg lucideSearch class="size-5"></svg>
		</button>
		@if (gdriveNeedsReauth()) {
			<button
				class="flex items-center justify-center size-8 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-150 text-amber-500 dark:text-amber-400 hover:bg-gray-200 dark:hover:bg-gray-800"
				(click)="reconnectGDrive()"
				aria-label="Reconnect Google Drive"
				title="Google Drive sign-in expired — click to reconnect"
			>
				<svg lucideCloud class="size-5"></svg>
			</button>
		} @else if (!platformService.isDesktopTauri() && syncEngine.syncFailed()) {
			<button
				class="flex items-center justify-center size-8 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-150 text-red-500 dark:text-red-400 hover:bg-gray-200 dark:hover:bg-gray-800"
				(click)="syncNow()"
				aria-label="Sync now — auto-sync failed"
				[attr.title]="syncEngine.lastSyncError() ?? 'Sync now'"
			>
				<svg
					lucideRefreshCw
					class="size-5"
					[class.animate-spin]="syncEngine.isSyncing()"
				></svg>
			</button>
		}

		@if (!platformService.isDesktopTauri()) {
			<button
				class="flex items-center justify-center size-8 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-150 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-gray-100"
				(click)="openSettings.emit()"
				aria-label="Open settings"
				title="Settings"
			>
				<svg lucideSettings class="size-5"></svg>
			</button>
		}
	</div>
</header>
