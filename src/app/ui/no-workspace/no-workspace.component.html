<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-canvas p-8"
>
  <div class="w-full max-w-md text-center space-y-6">
    <div class="flex flex-col items-center gap-4">
      <span
        class="flex size-12 items-center justify-center rounded-[13px] bg-accent text-white shadow-hairline"
      >
        <svg
          viewBox="0 0 24 24"
          class="size-6 fill-none stroke-current stroke-2 [stroke-linecap:round] [stroke-linejoin:round]"
        >
          <path d="M13 2 3 14h9l-1 8 10-12h-9z" />
        </svg>
      </span>
      <div>
        <h1 class="text-[30px] font-bold tracking-[-0.02em] text-ink-1 mb-2">
          Welcome
        </h1>
        <p class="text-base leading-relaxed text-ink-3">
          Select a folder to get started with your notes.
        </p>
      </div>
    </div>
    <button
      (click)="pickWorkspace.emit()"
      class="w-full px-8 py-3.5 bg-accent hover:bg-accent-2 text-white text-[15px] font-semibold rounded-btn transition-colors"
    >
      Pick Workspace
    </button>
  </div>
</div>
