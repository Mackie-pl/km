<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-white dark:bg-gray-950 p-8"
>
  <div class="w-full max-w-md text-center space-y-6">
    <div>
      <h1 class="text-4xl font-bold text-gray-900 dark:text-gray-100 mb-2">
        Welcome
      </h1>
      <p class="text-gray-500 dark:text-gray-400">
        Select a folder to get started with your notes.
      </p>
    </div>
    <button
      (click)="pickWorkspace.emit()"
      class="w-full px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition-colors text-lg"
    >
      Pick Workspace
    </button>
  </div>
</div>
